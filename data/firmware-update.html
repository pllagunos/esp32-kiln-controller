<!DOCTYPE html>
<html>

<head>
  <title>Firmware Update</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
  <link rel="apple-touch-icon" href="/favicon/apple-touch-icon.png">
  <link rel="manifest" href="/favicon/site.webmanifest">
  <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
  <div class="topnav">
    <h1>Firmware Update</h1>
  </div>
  <div class="content">
    <div class="card-grid">
      <div class="card">
        <p>Current version: <strong id="currentVersion">loading…</strong></p>
        <p>Latest version: <strong id="latestVersion">—</strong></p>
        <p id="statusMsg">&nbsp;</p>
        <p>
          <button id="checkBtn" class="button-on" onclick="checkForUpdate()">Check for Update</button>
          <button id="updateBtn" class="button-main" onclick="performOtaUpdate()" style="display:none">Update Now</button>
          <button class="button-on" onclick="window.location.href='/'">Go Back</button>
        </p>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script>loadFirmwareUpdate();</script>
</body>

</html>
